name: Stage npm package

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  stage:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.1
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@11.18.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm package:pack
      - run: pnpm package:inspect
      - run: pnpm package:test-install
      - run: pnpm package:publish-audit
      - name: Read package version
        run: node -p '"PACKAGE_VERSION=" + require("./package.json").version' >> "$GITHUB_ENV"
      - name: Verify tag and package version match
        run: test "$GITHUB_REF_NAME" = "v$PACKAGE_VERSION"
      - name: Stage package for 2FA approval
        run: npm stage publish "artifacts/package/codeoutcome-$PACKAGE_VERSION.tgz" --access public --tag latest --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
