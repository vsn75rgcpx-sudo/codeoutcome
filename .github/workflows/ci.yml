name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CODEOUTCOME_DATA_DIR: /tmp/codeoutcome-data
  CODEOUTCOME_CLAUDE_LOG_DIR: /tmp/provider-logs/claude
  CODEOUTCOME_CODEX_LOG_DIR: /tmp/provider-logs/codex

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: pnpm
      - name: Prepare isolated local directories
        run: mkdir -p "$CODEOUTCOME_DATA_DIR" "$CODEOUTCOME_CLAUDE_LOG_DIR" "$CODEOUTCOME_CODEX_LOG_DIR"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm import:large-smoke
      - run: pnpm dashboard:test
      - run: pnpm build
      - run: pnpm demo:smoke

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: pnpm
      - run: mkdir -p "$CODEOUTCOME_DATA_DIR" "$CODEOUTCOME_CLAUDE_LOG_DIR" "$CODEOUTCOME_CODEX_LOG_DIR"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
      - name: Upload synthetic failure traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-synthetic-failures
          path: artifacts/playwright
          retention-days: 7

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: pnpm
      - run: mkdir -p "$CODEOUTCOME_DATA_DIR" "$CODEOUTCOME_CLAUDE_LOG_DIR" "$CODEOUTCOME_CODEX_LOG_DIR"
      - run: pnpm install --frozen-lockfile
      - run: pnpm package:pack
      - run: pnpm package:inspect
      - run: pnpm package:test-install
      - run: pnpm package:publish-audit

  linux-install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.14.0, 24]
    env:
      CODEOUTCOME_DATA_DIR: /tmp/codeoutcome-linux-install
      CODEOUTCOME_CODEX_LOG_DIR: ${{ github.workspace }}/fixtures/codex
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.1
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: mkdir -p "$CODEOUTCOME_DATA_DIR"
      - run: pnpm install --frozen-lockfile
      - run: pnpm package:pack
      - name: Install the packed CLI globally
        run: npm install --global ./artifacts/package/codeoutcome-0.1.0-alpha.2.tgz
      - run: codeoutcome --version
      - run: codeoutcome doctor --provider codex --json
      - run: codeoutcome import --provider codex
      - run: codeoutcome usage --weekly
      - run: codeoutcome feedback --json
